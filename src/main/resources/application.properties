# Hibernate validation (to prevent schema drift across tenants in production)
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
# validate = fail on startup if schema drifts; Flyway handles all DDL changes
spring.jpa.hibernate.ddl-auto=validate

# Disable Spring Boot auto-Flyway — we configure Flyway manually per datasource
