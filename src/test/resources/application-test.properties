spring.datasource.master.url=jdbc:h2:mem:masterdb;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.master.driver-class-name=org.h2.Driver
spring.datasource.master.username=sa
spring.datasource.master.password=

app.datasource.tenant.hotel1.url=jdbc:h2:mem:hotel1db;DB_CLOSE_DELAY=-1;MODE=MySQL
app.datasource.tenant.hotel1.driver-class-name=org.h2.Driver
app.datasource.tenant.hotel1.username=sa
app.datasource.tenant.hotel1.password=

app.datasource.tenant.hotel3.url=jdbc:h2:mem:hotel3db;DB_CLOSE_DELAY=-1;MODE=MySQL
app.datasource.tenant.hotel3.driver-class-name=org.h2.Driver
app.datasource.tenant.hotel3.username=sa
app.datasource.tenant.hotel3.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.flyway.enabled=false
spring.flyway.baseline-on-migrate=true
spring.flyway.repair-on-migrate=true
spring.flyway.out-of-order=true
spring.jpa.show-sql=true
spring.test.database.replace=none
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
